<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Charapita SAC</title>

    <link rel="icon" type="image/x-icon" th:href="@{/img/logo.png}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/login.css}" href="/css/login.css">
</head>

<body>

    <div class="login-container">
        <div class="login-header">
            <img th:src="@{/img/logo.png}" src="/img/logo.png" alt="Logo Charapita SAC">
            <h2>Carnes y Ahumados Charapita</h2>
        </div>

        <div class="login-body">
            <div th:if="${error}" class="alert-error">
                <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}">Mensaje de error</span>
            </div>

            <form th:action="@{/auth/login}" method="POST" id="loginForm">
                <div class="form-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" name="correo" class="form-control" placeholder="Ingrese su correo"
                        required autofocus>
                </div>

                <div class="form-group">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" class="form-control"
                        placeholder="Ingrese su contraseña" required>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión
                </button>
            </form>
        </div>

        <div class="login-footer">
            &copy; 2026 Carnes y Ahumados Charapita SAC. Todos los derechos reservados.
        </div>
    </div>

    <script th:src="@{/js/login.js}" src="/js/login.js"></script>
</body>

</html>
